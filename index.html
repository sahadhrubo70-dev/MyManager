<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Pro - Final Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .hidden-section { display: none !important; }
        .active-tab { border-bottom: 4px solid white; opacity: 1 !important; }
    </style>
</head>
<body>

    <!-- AUTH SCREEN -->
    <div id="authScreen" class="fixed inset-0 bg-[#4f46e5] z-[500] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl">
            <h1 class="text-3xl font-black italic text-[#4f46e5] text-center mb-6 uppercase">Manager</h1>
            <div class="space-y-4">
                <div id="regFields" class="hidden-section space-y-4">
                    <input type="text" id="fullName" placeholder="Full Name" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none">
                    <select id="userRole" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none font-bold text-slate-500">
                        <option value="student">Student</option>
                        <option value="pro">Professional</option>
                    </select>
                </div>
                <input type="text" id="username" placeholder="Username" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none">
                <input type="password" id="password" placeholder="Password" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none">
                <button onclick="handleAuth()" id="authBtn" class="w-full bg-[#4f46e5] text-white py-4 rounded-2xl font-black">LOGIN</button>
                <button onclick="toggleAuthMode()" id="toggleBtn" class="w-full text-xs font-bold text-slate-400 uppercase tracking-widest mt-2 text-center">Create New Account</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="hidden-section">
        <nav class="bg-[#4f46e5] text-white shadow-xl sticky top-0 z-[100]">
            <div class="max-w-7xl mx-auto px-6 pt-6 pb-2 flex justify-between items-center">
                <h1 class="text-xl font-black italic uppercase">Manager</h1>
                <div class="flex items-center gap-4">
                    <span id="displayUserName" class="text-sm font-bold bg-white/20 px-3 py-1 rounded-lg uppercase">User</span>
                    <button onclick="logout()" class="text-[10px] bg-rose-500 px-4 py-1.5 rounded-lg font-black uppercase">Logout</button>
                </div>
            </div>
            <div class="max-w-7xl mx-auto px-6 flex gap-8">
                <button onclick="switchTab('expenseTab')" id="btnExpenseTab" class="py-3 text-sm font-bold opacity-60 active-tab uppercase tracking-widest">Dashboard</button>
                <button onclick="switchTab('portalTab')" id="btnPortalTab" class="py-3 text-sm font-bold opacity-60 uppercase tracking-widest"><span id="portalTitle">Portal</span></button>
            </div>
        </nav>

        <!-- Weather Bar -->
        <div class="bg-white border-b px-6 py-3 flex justify-between items-center text-[10px] font-bold text-slate-500 uppercase tracking-widest">
            <div id="weatherInfo">Loading Weather...</div>
            <div id="dateTimeInfo"></div>
        </div>

        <div class="max-w-7xl mx-auto p-6 space-y-6">
            
            <!-- DASHBOARD TAB -->
            <div id="expenseTab" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100">
                        <p class="text-slate-400 text-[10px] font-bold uppercase mb-2">Current Balance</p>
                        <h2 class="text-4xl font-black text-slate-800 mb-6">৳ <span id="mainBal">0.00</span></h2>
                        <div class="flex gap-2">
                            <input type="number" id="topupAmt" placeholder="Add Money" class="flex-1 border p-3 rounded-xl bg-slate-50">
                            <button onclick="updateBalance()" class="bg-emerald-500 text-white px-6 rounded-xl font-black">Add</button>
                        </div>
                    </div>

                    <!-- Quick Expense with Date -->
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100">
                        <p class="text-slate-400 text-[10px] font-bold uppercase mb-4">Add Quick Expense</p>
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <select id="expCategory" class="border p-3 rounded-xl bg-slate-50 font-bold text-sm">
                                <option>Rent</option><option>Utility Bill</option><option>Semester Fee</option><option>EMI</option><option>Extra Cost</option>
                            </select>
                            <input type="number" id="expAmount" placeholder="Amount" class="border p-3 rounded-xl bg-slate-50">
                            <input type="date" id="expDate" class="border p-3 rounded-xl bg-slate-50 text-sm">
                            <input type="text" id="expNote" placeholder="Note" class="border p-3 rounded-xl bg-slate-50">
                        </div>
                        <button onclick="addToReminder()" class="w-full bg-[#4f46e5] text-white py-3 rounded-xl font-black uppercase text-xs">Add to Reminder</button>
                    </div>
                </div>

                <!-- Important Note & Lists -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- Important Note Section -->
                    <div class="bg-indigo-50 p-6 rounded-[2rem] border border-indigo-100">
                        <h3 class="text-xs font-black uppercase text-indigo-600 mb-3 italic">Important Notes</h3>
                        <textarea id="importantNote" oninput="saveNote()" class="w-full h-32 bg-transparent border-none outline-none text-sm text-indigo-900 placeholder-indigo-300" placeholder="Write your important information here..."></textarea>
                    </div>
                    <div class="bg-white p-6 rounded-[2rem] shadow-sm overflow-hidden">
                        <h3 class="text-xs font-black uppercase text-orange-500 mb-4 tracking-widest">Pending (Reminders)</h3>
                        <div id="reminderList" class="space-y-3"></div>
                    </div>
                    <div class="bg-white p-6 rounded-[2rem] shadow-sm overflow-hidden">
                        <h3 class="text-xs font-black uppercase text-slate-400 mb-4 tracking-widest">Recent Transactions</h3>
                        <div id="transList" class="space-y-3"></div>
                    </div>
                </div>
            </div>

            <!-- PORTAL TAB -->
            <div id="portalTab" class="hidden-section space-y-6">
                <div id="portalGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
            </div>
        </div>
    </div>

    <!-- ROUTINE MODAL -->
    <div id="routineModal" class="fixed inset-0 bg-black/60 hidden z-[200] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 overflow-y-auto max-h-[90vh]">
            <h2 class="text-xl font-black mb-6 italic text-indigo-600 uppercase">Class Routine Manager</h2>
            <div class="space-y-3 mb-6 bg-slate-50 p-4 rounded-2xl">
                <input type="text" id="rtCourse" placeholder="Course Name" class="w-full p-3 rounded-xl border">
                <input type="text" id="rtCode" placeholder="Course Code" class="w-full p-3 rounded-xl border">
                <input type="text" id="rtTeacher" placeholder="Teacher Name" class="w-full p-3 rounded-xl border">
                <div class="flex gap-2">
                    <select id="rtDay" class="flex-1 p-3 rounded-xl border">
                        <option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
                    </select>
                    <input type="time" id="rtTime" class="flex-1 p-3 rounded-xl border">
                </div>
                <button onclick="addRoutine()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-black">SAVE TO ROUTINE</button>
            </div>
            <div id="routineDisplay" class="space-y-2"></div>
            <button onclick="closeModal('routineModal')" class="w-full mt-4 text-slate-400 font-bold text-xs uppercase">Close</button>
        </div>
    </div>

    <script>
        let isLogin = true;
        let balance = parseFloat(localStorage.getItem('m_bal')) || 0;
        let expenses = JSON.parse(localStorage.getItem('m_expenses')) || [];
        let reminders = JSON.parse(localStorage.getItem('m_reminders')) || [];
        let routines = JSON.parse(localStorage.getItem('m_routines')) || [];
        let userRole = "";

        // AUTH
        function toggleAuthMode() {
            isLogin = !isLogin;
            document.getElementById('regFields').classList.toggle('hidden-section');
            document.getElementById('authBtn').innerText = isLogin ? "LOGIN" : "SIGN UP";
        }

        function handleAuth() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(!isLogin) {
                const n = document.getElementById('fullName').value;
                const r = document.getElementById('userRole').value;
                localStorage.setItem(`u_${u}`, JSON.stringify({name: n, pass: p, role: r}));
                toggleAuthMode();
            } else {
                const data = JSON.parse(localStorage.getItem(`u_${u}`));
                if(data && data.pass === p) {
                    localStorage.setItem('active_user', u);
                    startApp(data);
                } else alert("Error");
            }
        }

        function startApp(data) {
            userRole = data.role;
            document.getElementById('authScreen').classList.add('hidden-section');
            document.getElementById('mainApp').classList.remove('hidden-section');
            document.getElementById('displayUserName').innerText = `${data.name} (${data.role})`;
            document.getElementById('portalTitle').innerText = userRole === 'student' ? "STUDENT PORTAL" : "PROFESSION PORTAL";
            document.getElementById('importantNote').value = localStorage.getItem('m_note') || "";
            renderPortal(); renderUI(); startWeather(); checkNotifications();
        }

        // WEATHER
        function startWeather() {
            const now = new Date();
            document.getElementById('dateTimeInfo').innerText = `${now.toLocaleDateString()} | ${now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
            document.getElementById('weatherInfo').innerText = "Temp: 32°C | Khulna, Bangladesh";
        }

        // NOTES
        function saveNote() {
            localStorage.setItem('m_note', document.getElementById('importantNote').value);
        }

        // EXPENSES & REMINDERS
        function addToReminder() {
            const cat = document.getElementById('expCategory').value;
            const amt = parseFloat(document.getElementById('expAmount').value);
            const date = document.getElementById('expDate').value;
            const note = document.getElementById('expNote').value;
            if(!amt || !date) return alert("Fill all fields");

            reminders.push({ id: Date.now(), cat, amt, date, note });
            localStorage.setItem('m_reminders', JSON.stringify(reminders));
            renderUI();
        }

        function payDone(id) {
            const idx = reminders.findIndex(r => r.id === id);
            const item = reminders[idx];
            if(item.amt > balance) return alert("Low Balance");
            balance -= item.amt;
            expenses.unshift({...item, payDate: new Date().toLocaleDateString()});
            reminders.splice(idx, 1);
            localStorage.setItem('m_bal', balance);
            localStorage.setItem('m_reminders', JSON.stringify(reminders));
            localStorage.setItem('m_expenses', JSON.stringify(expenses));
            renderUI();
        }

        // ROUTINE & NOTIFICATION
        function addRoutine() {
            const course = document.getElementById('rtCourse').value;
            const code = document.getElementById('rtCode').value;
            const teacher = document.getElementById('rtTeacher').value;
            const day = document.getElementById('rtDay').value;
            const time = document.getElementById('rtTime').value;
            if(!course || !time) return;

            routines.push({ course, code, teacher, day, time });
            localStorage.setItem('m_routines', JSON.stringify(routines));
            renderRoutineList();
        }

        function checkNotifications() {
            setInterval(() => {
                const now = new Date();
                const currentDay = now.toLocaleString('en-us', {weekday: 'long'});
                const currentTime = now.getHours() * 60 + now.getMinutes();

                routines.forEach(r => {
                    const [h, m] = r.time.split(':');
                    const classTime = parseInt(h) * 60 + parseInt(m);
                    if(r.day === currentDay && (classTime - currentTime) === 45) {
                        alert(`NOTIFICATION: Your class "${r.course}" starts in 45 minutes!`);
                    }
                });
            }, 60000);
        }

        // UI RENDER
        function renderUI() {
            document.getElementById('mainBal').innerText = balance.toLocaleString();
            document.getElementById('reminderList').innerHTML = reminders.map(r => `
                <div class="bg-orange-50 p-3 rounded-xl border border-orange-100 flex justify-between items-center">
                    <div class="text-[10px] font-bold">
                        <span class="text-orange-600">${r.cat}</span><br>
                        <span class="text-slate-400">${r.date} | ${r.note}</span>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-sm">৳${r.amt}</p>
                        <button onclick="payDone(${r.id})" class="bg-orange-500 text-white px-2 py-1 rounded text-[8px] font-black uppercase">Pay Done</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('transList').innerHTML = expenses.map(e => `
                <div class="border-b pb-2 flex justify-between items-center">
                    <div class="text-[9px] font-bold"><span>${e.cat}</span><br><span class="text-slate-300">${e.date}</span></div>
                    <span class="text-rose-500 font-black text-xs">-৳${e.amt}</span>
                </div>
            `).join('');
        }

        function renderPortal() {
            const grid = document.getElementById('portalGrid');
            if(userRole === 'student') {
                grid.innerHTML = `
                    <div onclick="alert('GPA Working')" class="bg-blue-600 p-8 rounded-[2rem] text-white cursor-pointer shadow-lg">GPA CALCULATOR</div>
                    <div onclick="openModal('routineModal')" class="bg-purple-600 p-8 rounded-[2rem] text-white cursor-pointer shadow-lg">CLASS ROUTINE</div>
                    <div onclick="alert('Cover Working')" class="bg-indigo-600 p-8 rounded-[2rem] text-white cursor-pointer shadow-lg">COVER & INDEX</div>
                `;
            } else {
                grid.innerHTML = `
                    <div onclick="alert('Calc Working')" class="bg-slate-700 p-8 rounded-[2rem] text-white cursor-pointer shadow-lg">CALCULATOR</div>
                    <div onclick="alert('Schedule Working')" class="bg-emerald-600 p-8 rounded-[2rem] text-white cursor-pointer shadow-lg">WORK SCHEDULE</div>
                    <div onclick="alert('Cover Working')" class="bg-indigo-600 p-8 rounded-[2rem] text-white cursor-pointer shadow-lg">COVER & INDEX</div>
                `;
            }
        }

        function renderRoutineList() {
            document.getElementById('routineDisplay').innerHTML = routines.map(r => `
                <div class="text-[10px] bg-white p-3 rounded-xl border flex justify-between font-bold uppercase">
                    <span>${r.course} (${r.code})<br><small>${r.teacher}</small></span>
                    <span class="text-indigo-600 text-right">${r.day}<br>${r.time}</span>
                </div>
            `).join('');
        }

        // UTILS
        function updateBalance() {
            const val = parseFloat(document.getElementById('topupAmt').value);
            if(val) balance += val; localStorage.setItem('m_bal', balance); renderUI();
            document.getElementById('topupAmt').value = "";
        }
        function switchTab(id) {
            document.getElementById('expenseTab').classList.add('hidden-section');
            document.getElementById('portalTab').classList.add('hidden-section');
            document.getElementById(id).classList.remove('hidden-section');
            document.getElementById('btnExpenseTab').classList.remove('active-tab');
            document.getElementById('btnPortalTab').classList.remove('active-tab');
            document.getElementById('btn' + id.charAt(0).toUpperCase() + id.slice(1)).classList.add('active-tab');
        }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); renderRoutineList(); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function logout() { localStorage.removeItem('active_user'); location.reload(); }

        window.onload = () => {
            const session = localStorage.getItem('active_user');
            if(session) startApp(JSON.parse(localStorage.getItem(`u_${session}`)));
        };
    </script>
</body>
</html>
