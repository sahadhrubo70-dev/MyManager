<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Pro - Advanced Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .hidden-section { display: none !important; }
        .active-tab { border-bottom: 4px solid white; opacity: 1 !important; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-blur: 10px; }
    </style>
</head>
<body>

    <!-- AUTH SCREEN (Login/Signup unchanged) -->
    <div id="authScreen" class="fixed inset-0 bg-[#4f46e5] z-[500] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl">
            <h1 class="text-3xl font-black italic text-[#4f46e5] text-center mb-6 uppercase">Manager</h1>
            <div id="authForm" class="space-y-4">
                <div id="regFields" class="hidden-section space-y-4">
                    <input type="text" id="fullName" placeholder="Full Name" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none">
                    <select id="userRole" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none font-bold text-slate-500">
                        <option value="">Select Role</option>
                        <option value="student">Student</option>
                        <option value="pro">Professional</option>
                    </select>
                </div>
                <input type="text" id="username" placeholder="Username" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none">
                <input type="password" id="password" placeholder="Password" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none">
                <button onclick="handleAuth()" id="authBtn" class="w-full bg-[#4f46e5] text-white py-4 rounded-2xl font-black">LOGIN</button>
                <button onclick="toggleAuthMode()" id="toggleBtn" class="w-full text-xs font-bold text-slate-400 uppercase tracking-widest mt-2">Create New Account</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="hidden-section">
        <nav class="bg-[#4f46e5] text-white shadow-xl sticky top-0 z-[100]">
            <div class="max-w-7xl mx-auto px-6 pt-6 pb-2 flex justify-between items-center">
                <h1 class="text-xl font-black italic uppercase">Manager</h1>
                <div class="flex items-center gap-4">
                    <span id="displayUserName" class="text-sm font-bold bg-white/20 px-3 py-1 rounded-lg uppercase">User</span>
                    <button onclick="logout()" class="text-[10px] bg-rose-500 px-4 py-1.5 rounded-lg font-black uppercase">Logout</button>
                </div>
            </div>
            <div class="max-w-7xl mx-auto px-6 flex gap-8">
                <button onclick="switchTab('expenseTab')" id="btnExpenseTab" class="py-3 text-sm font-bold opacity-60 active-tab uppercase tracking-widest">Dashboard</button>
                <button onclick="switchTab('portalTab')" id="btnPortalTab" class="py-3 text-sm font-bold opacity-60 uppercase tracking-widest">Portal</button>
            </div>
        </nav>

        <!-- Weather Bar -->
        <div class="bg-white border-b px-6 py-3 flex flex-wrap justify-between items-center text-xs font-bold text-slate-500 uppercase tracking-tighter">
            <div id="weatherInfo"><i class="fas fa-cloud-sun mr-2"></i>Loading Weather...</div>
            <div id="dateTimeInfo"></div>
        </div>

        <div class="max-w-7xl mx-auto p-6 space-y-6">
            
            <!-- DASHBOARD TAB -->
            <div id="expenseTab" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Balance -->
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100">
                        <p class="text-slate-400 text-[10px] font-bold uppercase mb-2">Current Balance</p>
                        <h2 class="text-4xl font-black text-slate-800 mb-6">৳ <span id="mainBal">0.00</span></h2>
                        <div class="flex gap-2">
                            <input type="number" id="topupAmt" placeholder="Add Money" class="flex-1 border p-3 rounded-xl bg-slate-50 outline-none">
                            <button onclick="updateBalance()" class="bg-emerald-500 text-white px-6 rounded-xl font-black">Add</button>
                        </div>
                    </div>

                    <!-- Quick Expense Entry -->
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100">
                        <p class="text-slate-400 text-[10px] font-bold uppercase mb-4">Add Quick Expense</p>
                        <div class="grid grid-cols-1 gap-3">
                            <div class="flex gap-2">
                                <select id="expCategory" class="flex-1 border p-3 rounded-xl bg-slate-50 font-bold text-sm">
                                    <option>Rent</option>
                                    <option>Utility Bill</option>
                                    <option>Semester Fee</option>
                                    <option>EMI</option>
                                    <option>Extra Cost</option>
                                </select>
                                <input type="number" id="expAmount" placeholder="Amount" class="flex-1 border p-3 rounded-xl bg-slate-50">
                            </div>
                            <input type="text" id="expNote" placeholder="Note (Optional)" class="w-full border p-3 rounded-xl bg-slate-50">
                            <button onclick="addReminderFromExp()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-black">Add to Reminder</button>
                        </div>
                    </div>
                </div>

                <!-- Reminders & Transactions -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-[2rem] shadow-sm">
                        <h3 class="text-xs font-black uppercase text-orange-500 mb-4 tracking-widest">Pending Payments (Reminders)</h3>
                        <div id="reminderList" class="space-y-3"></div>
                    </div>
                    <div class="bg-white p-6 rounded-[2rem] shadow-sm">
                        <h3 class="text-xs font-black uppercase text-slate-400 mb-4 tracking-widest">Recent Transactions</h3>
                        <div id="transList" class="space-y-3"></div>
                    </div>
                </div>
            </div>

            <!-- PORTAL TAB (Dynamic based on Role) -->
            <div id="portalTab" class="hidden-section grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Portal boxes will be injected by JS -->
            </div>
        </div>
    </div>

    <!-- GPA MODAL -->
    <div id="gpaModal" class="fixed inset-0 bg-black/60 hidden z-[200] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8">
            <h2 class="text-xl font-black italic mb-4 text-indigo-600">GPA CALCULATOR</h2>
            <div id="gpaInputs" class="space-y-2 mb-4">
                <input type="number" step="0.01" class="w-full border p-3 rounded-xl gpa-field" placeholder="Subject GP">
            </div>
            <button onclick="addGpaField()" class="text-xs font-bold text-indigo-500 mb-4">+ Add Subject</button>
            <button onclick="calculateGPA()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-black">Calculate</button>
            <p id="gpaResult" class="text-3xl font-black text-center mt-4"></p>
            <button onclick="closeModal('gpaModal')" class="w-full mt-4 text-slate-300 font-bold uppercase text-[10px]">Close</button>
        </div>
    </div>

    <script>
        let isLogin = true;
        let balance = parseFloat(localStorage.getItem('m_bal')) || 0;
        let expenses = JSON.parse(localStorage.getItem('m_expenses')) || [];
        let reminders = JSON.parse(localStorage.getItem('m_reminders')) || [];
        let userRole = "";

        // --- AUTH ---
        function toggleAuthMode() {
            isLogin = !isLogin;
            document.getElementById('regFields').classList.toggle('hidden-section');
            document.getElementById('authBtn').innerText = isLogin ? "LOGIN" : "SIGN UP";
        }

        function handleAuth() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(!user || !pass) return;

            if(!isLogin) {
                const name = document.getElementById('fullName').value;
                const role = document.getElementById('userRole').value;
                if(!role) return alert("Select Role");
                localStorage.setItem(`u_${user}`, JSON.stringify({name, pass, role}));
                toggleAuthMode();
            } else {
                const data = JSON.parse(localStorage.getItem(`u_${user}`));
                if(data && data.pass === pass) {
                    localStorage.setItem('active_user', user);
                    startApp(data);
                } else alert("Error");
            }
        }

        function startApp(data) {
            userRole = data.role;
            document.getElementById('authScreen').classList.add('hidden-section');
            document.getElementById('mainApp').classList.remove('hidden-section');
            document.getElementById('displayUserName').innerText = `${data.name} (${data.role})`;
            renderPortal();
            renderUI();
            startWeather();
        }

        // --- WEATHER & TIME ---
        function startWeather() {
            const now = new Date();
            const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            document.getElementById('dateTimeInfo').innerText = `${days[now.getDay()]} | ${now.toLocaleDateString()} | ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
            
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
                .then(r => r.json()).then(d => {
                    document.getElementById('weatherInfo').innerHTML = `<i class="fas fa-temperature-high mr-2"></i>${d.current_weather.temperature}°C (Local Weather)`;
                });
            });
        }

        // --- EXPENSE & REMINDER LOGIC ---
        function addReminderFromExp() {
            const cat = document.getElementById('expCategory').value;
            const amt = parseFloat(document.getElementById('expAmount').value);
            const note = document.getElementById('expNote').value;
            if(!amt) return;

            reminders.push({ id: Date.now(), cat, amt, note, date: new Date().toLocaleDateString() });
            localStorage.setItem('m_reminders', JSON.stringify(reminders));
            renderUI();
            document.getElementById('expAmount').value = "";
            document.getElementById('expNote').value = "";
        }

        function payDone(id) {
            const index = reminders.findIndex(r => r.id === id);
            const item = reminders[index];
            if(item.amt > balance) return alert("Insufficient Balance");

            balance -= item.amt;
            expenses.unshift({ ...item, payDate: new Date().toLocaleDateString() });
            reminders.splice(index, 1);
            
            localStorage.setItem('m_bal', balance);
            localStorage.setItem('m_reminders', JSON.stringify(reminders));
            localStorage.setItem('m_expenses', JSON.stringify(expenses));
            renderUI();
        }

        function updateBalance() {
            const amt = parseFloat(document.getElementById('topupAmt').value);
            if(amt) { balance += amt; localStorage.setItem('m_bal', balance); renderUI(); }
            document.getElementById('topupAmt').value = "";
        }

        // --- UI RENDERING ---
        function renderUI() {
            document.getElementById('mainBal').innerText = balance.toLocaleString();
            
            document.getElementById('reminderList').innerHTML = reminders.map(r => `
                <div class="flex justify-between items-center bg-orange-50 p-4 rounded-2xl border border-orange-100">
                    <div class="text-[10px] font-bold">
                        <span class="text-orange-600">${r.cat}</span><br>
                        <span class="text-slate-400">${r.date} - ${r.note}</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="font-black text-sm">৳${r.amt}</span>
                        <button onclick="payDone(${r.id})" class="bg-orange-500 text-white px-3 py-1 rounded-lg text-[10px] font-black uppercase">Pay Done</button>
                    </div>
                </div>
            `).join('');

            document.getElementById('transList').innerHTML = expenses.map(e => `
                <div class="flex justify-between items-center border-b pb-2">
                    <div class="text-[10px] font-bold">
                        <span class="text-slate-700">${e.cat}</span><br>
                        <span class="text-slate-300">${e.payDate} | ${e.note}</span>
                    </div>
                    <span class="text-rose-500 font-black">৳${e.amt}</span>
                </div>
            `).join('');
        }

        function renderPortal() {
            const portal = document.getElementById('portalTab');
            if(userRole === 'student') {
                portal.innerHTML = `
                    <div onclick="openModal('gpaModal')" class="bg-blue-600 p-10 rounded-[2rem] text-white cursor-pointer shadow-lg"><i class="fas fa-calculator text-2xl mb-4"></i><h2 class="font-black italic">GPA CALCULATOR</h2></div>
                    <div onclick="alert('Routine Loaded')" class="bg-purple-600 p-10 rounded-[2rem] text-white cursor-pointer shadow-lg"><i class="fas fa-calendar-alt text-2xl mb-4"></i><h2 class="font-black italic">CLASS ROUTINE</h2></div>
                    <div onclick="alert('Cover/Index Ready')" class="bg-indigo-600 p-10 rounded-[2rem] text-white cursor-pointer shadow-lg"><i class="fas fa-file-pdf text-2xl mb-4"></i><h2 class="font-black italic">COVER & INDEX</h2></div>
                `;
            } else {
                portal.innerHTML = `
                    <div onclick="alert('Normal Calculator')" class="bg-slate-700 p-10 rounded-[2rem] text-white cursor-pointer shadow-lg"><i class="fas fa-calculator text-2xl mb-4"></i><h2 class="font-black italic">CALCULATOR</h2></div>
                    <div onclick="alert('Work Schedule')" class="bg-emerald-600 p-10 rounded-[2rem] text-white cursor-pointer shadow-lg"><i class="fas fa-briefcase text-2xl mb-4"></i><h2 class="font-black italic">WORK SCHEDULE</h2></div>
                    <div onclick="alert('Cover/Index Ready')" class="bg-indigo-600 p-10 rounded-[2rem] text-white cursor-pointer shadow-lg"><i class="fas fa-file-pdf text-2xl mb-4"></i><h2 class="font-black italic">COVER & INDEX</h2></div>
                `;
            }
        }

        // --- TOOLS FIX ---
        function addGpaField() {
            document.getElementById('gpaInputs').insertAdjacentHTML('beforeend', `<input type="number" step="0.01" class="w-full border p-3 rounded-xl gpa-field" placeholder="Subject GP">`);
        }
        function calculateGPA() {
            const fields = document.querySelectorAll('.gpa-field');
            let sum = 0, count = 0;
            fields.forEach(f => { if(f.value) { sum += parseFloat(f.value); count++; } });
            document.getElementById('gpaResult').innerText = count > 0 ? (sum/count).toFixed(2) : "0.00";
        }

        function switchTab(id) {
            document.getElementById('expenseTab').classList.add('hidden-section');
            document.getElementById('portalTab').classList.add('hidden-section');
            document.getElementById(id).classList.remove('hidden-section');
            document.getElementById('btnExpenseTab').classList.remove('active-tab');
            document.getElementById('btnPortalTab').classList.remove('active-tab');
            document.getElementById('btn' + id.charAt(0).toUpperCase() + id.slice(1)).classList.add('active-tab');
        }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function logout() { localStorage.removeItem('active_user'); location.reload(); }

        window.onload = () => {
            const session = localStorage.getItem('active_user');
            if(session) startApp(JSON.parse(localStorage.getItem(`u_${session}`)));
        };
    </script>
</body>
</html>
