<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Pro - Fixed Portals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; display: flex; flex-direction: column; min-height: 100vh; }
        .hidden-section { display: none !important; }
        .active-tab { border-bottom: 4px solid white; opacity: 1 !important; }
        .portal-card { cursor: pointer; transition: 0.3s; border: 1px solid rgba(0,0,0,0.05); }
        .portal-card:hover { transform: translateY(-5px); filter: brightness(1.1); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 100%; max-width: 500px; padding: 30px; border-radius: 2.5rem; position: relative; max-height: 90vh; overflow-y: auto; }
        .p-input { width: 100%; border: 1px solid #e2e8f0; padding: 12px; border-radius: 12px; outline: none; text-sm font-medium; }
        .p-label { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #94a3b8; margin-bottom: 2px; display: block; }
        /* Calculator UI */
        .calc-screen { background: #f1f5f9; width: 100%; text-align: right; padding: 20px; border-radius: 1rem; font-size: 1.5rem; font-weight: 900; margin-bottom: 1rem; border: none; outline: none; }
        .c-btn { background: #f1f5f9; padding: 20px; border-radius: 12px; font-weight: 800; text-align: center; cursor: pointer; transition: 0.2s; }
        .c-btn:active { transform: scale(0.95); background: #e2e8f0; }
    </style>
</head>
<body>

    <!-- AUTH SCREEN -->
    <div id="authScreen" class="fixed inset-0 bg-[#4f46e5] z-[2000] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl">
            <h1 class="text-3xl font-black italic text-[#4f46e5] text-center mb-6 uppercase">Manager</h1>
            <div class="space-y-4">
                <div id="regFields" class="hidden-section space-y-4">
                    <input type="text" id="fullName" placeholder="Full Name" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none">
                    <select id="userRole" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none font-bold text-slate-500">
                        <option value="student">Student</option>
                        <option value="pro">Professional</option>
                    </select>
                </div>
                <input type="text" id="username" placeholder="Username" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none">
                <input type="password" id="password" placeholder="Password" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none">
                <button onclick="handleAuth()" class="w-full bg-[#4f46e5] text-white py-4 rounded-2xl font-black">LOGIN</button>
                <button onclick="toggleAuthMode()" class="w-full text-xs font-bold text-slate-400 uppercase tracking-widest mt-2">Create New Account</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="hidden-section flex-grow">
        <nav class="bg-[#4f46e5] text-white shadow-xl sticky top-0 z-[100]">
            <div class="max-w-7xl mx-auto px-6 pt-6 pb-2 flex justify-between items-center">
                <h1 class="text-xl font-black italic uppercase">Manager</h1>
                <div class="flex items-center gap-4">
                    <span id="displayUserName" class="text-sm font-bold bg-white/20 px-3 py-1 rounded-lg">USER</span>
                    <button onclick="logout()" class="text-[10px] bg-rose-500 px-4 py-1.5 rounded-lg font-black uppercase">Logout</button>
                </div>
            </div>
            <div class="max-w-7xl mx-auto px-6 flex gap-8">
                <button onclick="switchTab('expenseTab')" id="btnExpenseTab" class="py-3 text-sm font-bold opacity-60 active-tab uppercase">Dashboard</button>
                <button onclick="switchTab('portalTab')" id="btnPortalTab" class="py-3 text-sm font-bold opacity-60 uppercase">Portal</button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-6">
            <!-- PORTAL -->
            <div id="portalTab" class="hidden-section">
                <div class="flex items-center gap-3 mb-6">
                    <div class="h-8 w-2 bg-[#4f46e5] rounded-full"></div>
                    <h2 id="portalNameDisplay" class="text-2xl font-black uppercase italic text-slate-800">PORTAL</h2>
                </div>
                <div id="portalGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
            </div>

            <!-- DASHBOARD (Placeholder) -->
            <div id="expenseTab" class="text-center py-20 font-bold text-slate-400 uppercase">Dashboard Content Here</div>
        </div>
    </div>

    <!-- MODAL -->
    <div id="commonModal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 id="modalTitle" class="text-xl font-black uppercase italic text-[#4f46e5]">Feature</h2>
                <button onclick="closeModal()"><i class="fas fa-times-circle text-2xl text-slate-300"></i></button>
            </div>
            <div id="modalBody" class="space-y-4"></div>
        </div>
    </div>

    <script>
        let userRole = "";
        let routineData = JSON.parse(localStorage.getItem('m_routine')) || [];

        // --- CALCULATOR ENGINE ---
        function openCalc() {
            document.getElementById('modalTitle').innerText = "Calculator";
            document.getElementById('modalBody').innerHTML = `
                <input type="text" id="cDisp" class="calc-screen" readonly value="0">
                <div class="grid grid-cols-4 gap-2">
                    <div onclick="cC()" class="c-btn text-rose-500 col-span-2">C</div>
                    <div onclick="cP('/')" class="c-btn bg-slate-100">/</div>
                    <div onclick="cP('*')" class="c-btn bg-slate-100">*</div>
                    <div onclick="cP('7')" class="c-btn">7</div><div onclick="cP('8')" class="c-btn">8</div><div onclick="cP('9')" class="c-btn">9</div>
                    <div onclick="cP('-')" class="c-btn bg-slate-100">-</div>
                    <div onclick="cP('4')" class="c-btn">4</div><div onclick="cP('5')" class="c-btn">5</div><div onclick="cP('6')" class="c-btn">6</div>
                    <div onclick="cP('+')" class="c-btn bg-slate-100">+</div>
                    <div onclick="cP('1')" class="c-btn">1</div><div onclick="cP('2')" class="c-btn">2</div><div onclick="cP('3')" class="c-btn">3</div>
                    <div onclick="cE()" class="c-btn bg-emerald-500 text-white row-span-2 flex items-center justify-center font-black">=</div>
                    <div onclick="cP('0')" class="c-btn col-span-2">0</div><div onclick="cP('.')" class="c-btn">.</div>
                </div>
            `;
            document.getElementById('commonModal').style.display = 'flex';
        }
        function cP(v) { let d = document.getElementById('cDisp'); d.value === '0' ? d.value = v : d.value += v; }
        function cC() { document.getElementById('cDisp').value = '0'; }
        function cE() { let d = document.getElementById('cDisp'); try { d.value = eval(d.value); } catch { d.value = 'Error'; } }

        // --- ROUTINE ENGINE ---
        function openRoutine() {
            document.getElementById('modalTitle').innerText = "Class Routine";
            updateRoutineUI();
            document.getElementById('commonModal').style.display = 'flex';
        }

        function updateRoutineUI() {
            const listHtml = routineData.map((item, index) => `
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 mb-3 text-[11px] font-bold uppercase relative">
                    <div class="flex justify-between text-[#4f46e5] mb-1"><span>${item.day}</span> <span>${item.time}</span></div>
                    <div class="text-slate-800 text-sm mb-1">${item.subject} (${item.code})</div>
                    <div class="text-slate-400 italic">Teacher: ${item.teacher}</div>
                    <button onclick="deleteRoutine(${index})" class="absolute top-4 right-4 text-rose-500"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');

            document.getElementById('modalBody').innerHTML = `
                <div class="max-h-64 overflow-y-auto pr-1">${listHtml || '<p class="text-center py-6 text-slate-400 font-bold uppercase text-[10px]">No Routine Found</p>'}</div>
                <div class="space-y-2 pt-4 border-t">
                    <input type="text" id="rtSub" placeholder="Subject Name" class="p-input text-xs mb-2">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="rtCode" placeholder="Course Code" class="p-input text-xs">
                        <input type="text" id="rtTeacher" placeholder="Teacher Name" class="p-input text-xs">
                        <select id="rtDay" class="p-input text-xs bg-white">
                            <option>Saturday</option><option>Sunday</option><option>Monday</option>
                            <option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option>
                        </select>
                        <input type="time" id="rtTime" class="p-input text-xs">
                    </div>
                    <button onclick="addRoutine()" class="w-full bg-[#4f46e5] text-white py-4 rounded-xl font-black text-xs uppercase mt-2">Save Routine</button>
                </div>
            `;
        }

        function addRoutine() {
            const subject = document.getElementById('rtSub').value;
            const code = document.getElementById('rtCode').value;
            const teacher = document.getElementById('rtTeacher').value;
            const day = document.getElementById('rtDay').value;
            const time = document.getElementById('rtTime').value;
            
            if(!subject || !time) { alert("Please fill Subject and Time"); return; }
            routineData.push({subject, code, teacher, day, time});
            localStorage.setItem('m_routine', JSON.stringify(routineData));
            updateRoutineUI();
        }

        function deleteRoutine(index) { routineData.splice(index, 1); localStorage.setItem('m_routine', JSON.stringify(routineData)); updateRoutineUI(); }

        // --- RENDER PORTAL ---
        function renderPortal() {
            const grid = document.getElementById('portalGrid');
            if(userRole === 'student') {
                grid.innerHTML = `
                    <div onclick="openCalc()" class="bg-blue-600 portal-card p-8 rounded-[2.5rem] text-white font-black italic shadow-lg">
                        <p class="text-[10px] opacity-60 mb-1">Math</p><h3>CALCULATOR</h3>
                    </div>
                    <div onclick="alert('GPA UI Open')" class="bg-purple-600 portal-card p-8 rounded-[2.5rem] text-white font-black italic shadow-lg">
                        <p class="text-[10px] opacity-60 mb-1">Education</p><h3>GPA CALCULATOR</h3>
                    </div>
                    <div onclick="openRoutine()" class="bg-indigo-600 portal-card p-8 rounded-[2.5rem] text-white font-black italic shadow-lg">
                        <p class="text-[10px] opacity-60 mb-1">Time</p><h3>CLASS ROUTINE</h3>
                    </div>
                    <div onclick="alert('Index UI Open')" class="bg-emerald-600 portal-card p-8 rounded-[2.5rem] text-white font-black italic shadow-lg">
                        <p class="text-[10px] opacity-60 mb-1">Files</p><h3>INDEX & COVER</h3>
                    </div>
                `;
            } else {
                grid.innerHTML = `
                    <div onclick="openCalc()" class="bg-slate-800 portal-card p-10 rounded-[2.5rem] text-white font-black italic shadow-lg">
                        <p class="text-[10px] opacity-60 mb-1">Tools</p><h3>CALCULATOR</h3>
                    </div>
                    <div onclick="alert('Work Sch UI')" class="bg-emerald-600 portal-card p-10 rounded-[2.5rem] text-white font-black italic shadow-lg">
                        <p class="text-[10px] opacity-60 mb-1">Planning</p><h3>WORK SCHEDULE</h3>
                    </div>
                    <div onclick="alert('EMI UI')" class="bg-[#4f46e5] portal-card p-10 rounded-[2.5rem] text-white font-black italic shadow-lg">
                        <p class="text-[10px] opacity-60 mb-1">Finance</p><h3>EMI CALCULATOR</h3>
                    </div>
                `;
            }
        }

        // --- AUTH & SYSTEM ---
        function handleAuth() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const isReg = !document.getElementById('regFields').classList.contains('hidden-section');
            if(isReg) {
                const n = document.getElementById('fullName').value;
                const r = document.getElementById('userRole').value;
                localStorage.setItem(`user_${u}`, JSON.stringify({name: n, pass: p, role: r}));
                toggleAuthMode();
            } else {
                const data = JSON.parse(localStorage.getItem(`user_${u}`));
                if(data && data.pass === p) {
                    localStorage.setItem('active_session', u);
                    startApp(data);
                } else alert("Invalid Login");
            }
        }

        function startApp(data) {
            userRole = data.role;
            document.getElementById('authScreen').classList.add('hidden-section');
            document.getElementById('mainApp').classList.remove('hidden-section');
            document.getElementById('displayUserName').innerText = data.name.toUpperCase();
            document.getElementById('portalNameDisplay').innerText = userRole === 'student' ? 'Student Portal' : 'Professional Portal';
            renderPortal();
        }

        function toggleAuthMode() { document.getElementById('regFields').classList.toggle('hidden-section'); }
        function logout() { localStorage.removeItem('active_session'); location.reload(); }
        function closeModal() { document.getElementById('commonModal').style.display = 'none'; }
        function switchTab(id) {
            document.getElementById('expenseTab').classList.add('hidden-section');
            document.getElementById('portalTab').classList.add('hidden-section');
            document.getElementById(id).classList.remove('hidden-section');
        }

        window.onload = () => {
            const s = localStorage.getItem('active_session');
            if(s) startApp(JSON.parse(localStorage.getItem(`user_${s}`)));
        };
    </script>
</body>
</html>
