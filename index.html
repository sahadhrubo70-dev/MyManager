<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Pro - Hybrid Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .hidden-section { display: none !important; }
        .active-tab { border-bottom: 4px solid white; opacity: 1 !important; }
        .captcha-box { user-select: none; letter-spacing: 5px; font-weight: 900; background: #e2e8f0; border-radius: 8px; }
    </style>
</head>
<body class="min-h-screen">

    <!-- 1. AUTH SCREEN -->
    <div id="authScreen" class="fixed inset-0 bg-[#4f46e5] z-[500] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl">
            <h1 class="text-3xl font-black italic text-[#4f46e5] text-center mb-6 uppercase">Manager</h1>
            <div id="authForm" class="space-y-4">
                <div id="regFields" class="hidden-section"><input type="text" id="fullName" placeholder="Full Name" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none"></div>
                <input type="text" id="username" placeholder="Username" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none">
                <input type="password" id="password" placeholder="Password" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none">
                <div class="flex items-center gap-4 bg-slate-100 p-3 rounded-2xl">
                    <div id="captchaDisplay" class="captcha-box px-4 py-2 text-indigo-600 italic"></div>
                    <input type="text" id="captchaInput" placeholder="Verify" class="flex-1 p-2 rounded-xl border-none outline-none text-center font-bold">
                </div>
                <button onclick="handleAuth()" id="authBtn" class="w-full bg-[#4f46e5] text-white py-4 rounded-2xl font-black shadow-lg">LOGIN</button>
                <button onclick="toggleAuthMode()" id="toggleBtn" class="w-full text-xs font-bold text-slate-400 uppercase tracking-widest">Create New Account</button>
            </div>
        </div>
    </div>

    <!-- 2. MAIN APP -->
    <div id="mainApp" class="hidden-section">
        <!-- Header & Tabs -->
        <nav class="bg-[#4f46e5] text-white shadow-xl sticky top-0 z-[100]">
            <div class="max-w-7xl mx-auto px-6 pt-6 pb-2 flex justify-between items-center">
                <h1 class="text-xl font-black italic tracking-tighter uppercase">Manager</h1>
                <div class="flex items-center gap-4">
                    <span id="displayUserName" class="text-sm font-bold opacity-80">User</span>
                    <button onclick="logout()" class="text-[10px] bg-white/20 px-4 py-1.5 rounded-lg font-black uppercase">Logout</button>
                </div>
            </div>
            <!-- Tab Switcher (Inspired by your requirement) -->
            <div class="max-w-7xl mx-auto px-6 flex gap-8">
                <button onclick="switchTab('expenseTab')" id="btnExpenseTab" class="py-3 text-sm font-bold opacity-60 active-tab uppercase tracking-widest">Dashboard</button>
                <button onclick="switchTab('studentTab')" id="btnStudentTab" class="py-3 text-sm font-bold opacity-60 uppercase tracking-widest">Student Portal</button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-6 md:p-10">
            
            <!-- TAB 1: EXPENSE & MAIN DASHBOARD -->
            <div id="expenseTab" class="space-y-8 animate-fade-in">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- Balance Card -->
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                        <p class="text-slate-400 text-[10px] font-bold uppercase mb-2">Current Balance</p>
                        <h2 class="text-4xl font-black text-slate-800 mb-6">৳ <span id="mainBal">0.00</span></h2>
                        <input type="number" id="topupAmt" placeholder="Add Money" class="w-full border p-3 rounded-xl bg-slate-50 mb-2">
                        <button onclick="updateBalance()" class="w-full bg-emerald-500 text-white py-2 rounded-xl font-bold">Add Funds</button>
                    </div>

                    <!-- Summary Card -->
                    <div class="bg-[#4f46e5] p-8 rounded-[2.5rem] text-white shadow-xl flex flex-col justify-between">
                        <div>
                            <p class="text-white/60 text-[10px] font-bold uppercase">Monthly Spent</p>
                            <h2 class="text-4xl font-black">৳ <span id="totalSpent">0.00</span></h2>
                        </div>
                        <button onclick="downloadStatement()" class="bg-white text-indigo-600 py-3 rounded-2xl font-black text-xs mt-4">Download Statement</button>
                    </div>

                    <!-- Quick Add Expense -->
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                        <p class="text-slate-400 text-[10px] font-bold uppercase mb-4">Quick Expense</p>
                        <input type="text" id="expNote" placeholder="Note" class="w-full border p-3 rounded-xl bg-slate-50 mb-2 outline-none">
                        <input type="number" id="expAmount" placeholder="Amount" class="w-full border p-3 rounded-xl bg-slate-50 mb-2 outline-none">
                        <button onclick="addExpense()" class="w-full bg-rose-500 text-white py-3 rounded-xl font-bold">Pay Now</button>
                    </div>
                </div>

                <!-- Recent Transactions -->
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                    <h3 class="text-lg font-black mb-6 italic uppercase text-slate-700">Recent Transactions</h3>
                    <div id="transList" class="space-y-4">
                        <!-- Transactions will appear here -->
                    </div>
                </div>
            </div>

            <!-- TAB 2: STUDENT PORTAL (As per image_e54e1a.png) -->
            <div id="studentTab" class="hidden-section space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- GPA Card -->
                    <div onclick="openModal('gpaModal')" class="bg-blue-600 p-12 rounded-[2.5rem] text-white shadow-xl cursor-pointer transform hover:scale-105 transition-all">
                        <i class="fas fa-calculator text-5xl mb-6"></i>
                        <h2 class="text-3xl font-black italic mb-2">GPA CALCULATOR</h2>
                        <p class="text-sm opacity-80 italic">Check your academic results</p>
                    </div>
                    <!-- Student Tools -->
                    <div class="bg-[#6366f1] p-12 rounded-[2.5rem] text-white shadow-xl">
                        <h2 class="text-2xl font-black italic mb-6">STUDENT TOOLS</h2>
                        <div class="space-y-4">
                            <button onclick="openModal('routineModal')" class="w-full bg-white text-indigo-600 py-4 rounded-2xl font-black">Class Routine</button>
                            <button onclick="openModal('docModal')" class="w-full bg-white/20 text-white py-4 rounded-2xl font-black">Assignment Cover/Index</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODALS (GPA, Routine, etc.) -->
    <div id="gpaModal" class="fixed inset-0 bg-black/60 hidden z-[200] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-10">
            <h2 class="text-2xl font-black italic mb-6 text-indigo-600">GPA CALCULATOR</h2>
            <div id="gpaInputs" class="space-y-2 mb-4">
                <input type="number" step="0.01" class="w-full border p-4 rounded-2xl gpa-val" placeholder="Enter Grade Point">
            </div>
            <button onclick="addGpaInput()" class="text-indigo-500 font-bold text-xs mb-6">+ Add Subject</button>
            <button onclick="calcGpa()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black">CALCULATE</button>
            <p id="gpaFinal" class="text-4xl font-black text-center mt-6"></p>
            <button onclick="closeModal('gpaModal')" class="w-full text-slate-300 font-bold mt-4 uppercase text-[10px]">Close Window</button>
        </div>
    </div>

    <script>
        let isLoginMode = true;
        let captchaVal = "";
        let balance = parseFloat(localStorage.getItem('m_bal')) || 0;
        let expenses = JSON.parse(localStorage.getItem('m_expenses')) || [];

        // --- AUTH & CAPTCHA ---
        function generateCaptcha() {
            captchaVal = Math.random().toString(36).substring(2, 7).toUpperCase();
            document.getElementById('captchaDisplay').innerText = captchaVal;
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('regFields').classList.toggle('hidden-section');
            document.getElementById('authBtn').innerText = isLoginMode ? "LOGIN" : "SIGN UP";
            document.getElementById('toggleBtn').innerText = isLoginMode ? "Create New Account" : "Back to Login";
            generateCaptcha();
        }

        function handleAuth() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const captcha = document.getElementById('captchaInput').value;

            if(captcha !== captchaVal) return alert("Invalid Captcha");

            if(!isLoginMode) {
                const name = document.getElementById('fullName').value;
                localStorage.setItem(`user_${user}`, JSON.stringify({name, pass}));
                alert("Account Created!"); toggleAuthMode();
            } else {
                const data = JSON.parse(localStorage.getItem(`user_${user}`));
                if(data && data.pass === pass) {
                    localStorage.setItem('active_user', user);
                    startApp(data.name);
                } else alert("Error!");
            }
        }

        // --- TAB SYSTEM ---
        function switchTab(tabId) {
            document.getElementById('expenseTab').classList.add('hidden-section');
            document.getElementById('studentTab').classList.add('hidden-section');
            document.getElementById(tabId).classList.remove('hidden-section');

            document.getElementById('btnExpenseTab').classList.remove('active-tab');
            document.getElementById('btnStudentTab').classList.remove('active-tab');
            
            if(tabId === 'expenseTab') document.getElementById('btnExpenseTab').classList.add('active-tab');
            else document.getElementById('btnStudentTab').classList.add('active-tab');
        }

        // --- EXPENSE LOGIC ---
        function addExpense() {
            const note = document.getElementById('expNote').value;
            const amt = parseFloat(document.getElementById('expAmount').value);
            if(!note || !amt) return;
            if(amt > balance) return alert("Low Balance!");

            balance -= amt;
            const transaction = { note, amt, date: new Date().toLocaleString() };
            expenses.unshift(transaction);
            saveAndRefresh();
            document.getElementById('expNote').value = "";
            document.getElementById('expAmount').value = "";
        }

        function updateBalance() {
            const amt = parseFloat(document.getElementById('topupAmt').value);
            if(amt) { balance += amt; saveAndRefresh(); }
            document.getElementById('topupAmt').value = "";
        }

        function saveAndRefresh() {
            localStorage.setItem('m_bal', balance);
            localStorage.setItem('m_expenses', JSON.stringify(expenses));
            renderDashboard();
        }

        function renderDashboard() {
            document.getElementById('mainBal').innerText = balance.toLocaleString();
            let totalSpent = expenses.reduce((s, e) => s + e.amt, 0);
            document.getElementById('totalSpent').innerText = totalSpent.toLocaleString();

            const list = document.getElementById('transList');
            list.innerHTML = expenses.map(e => `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <div><p class="font-bold text-slate-700">${e.note}</p><p class="text-[9px] text-slate-400 font-bold">${e.date}</p></div>
                    <p class="font-black text-rose-500">- ৳${e.amt}</p>
                </div>
            `).join('');
        }

        // --- HELPERS ---
        function startApp(name) {
            document.getElementById('authScreen').classList.add('hidden-section');
            document.getElementById('mainApp').classList.remove('hidden-section');
            document.getElementById('displayUserName').innerText = name;
            renderDashboard();
        }

        function logout() { localStorage.removeItem('active_user'); location.reload(); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function addGpaInput() { document.getElementById('gpaInputs').insertAdjacentHTML('beforeend', `<input type="number" step="0.01" class="w-full border p-4 rounded-2xl gpa-val" placeholder="Grade Point">`); }
        
        function calcGpa() {
            const vals = document.querySelectorAll('.gpa-val');
            let sum = 0, count = 0;
            vals.forEach(v => { if(v.value) { sum += parseFloat(v.value); count++; }});
            document.getElementById('gpaFinal').innerText = count > 0 ? (sum/count).toFixed(2) : "0.00";
        }

        window.onload = () => {
            generateCaptcha();
            const active = localStorage.getItem('active_user');
            if(active) {
                const data = JSON.parse(localStorage.getItem(`user_${active}`));
                startApp(data.name);
            }
        };
    </script>
</body>
</html>
