<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager - Personal Smart Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <nav class="bg-indigo-700 text-white p-4 shadow-xl flex justify-between items-center px-6 sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <i class="fas fa-user-shield text-2xl text-yellow-400"></i>
            <h1 class="text-xl font-bold tracking-tighter uppercase italic">Manager</h1>
        </div>
        <div class="text-right">
            <p id="live-date" class="text-[10px] uppercase tracking-widest opacity-70"></p>
            <p id="live-time" class="text-lg font-mono font-bold"></p>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-4 md:p-8 space-y-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h3 class="text-slate-400 text-xs font-bold uppercase mb-2">Total Wallet Balance</h3>
                <div class="flex items-center gap-2 mb-4">
                    <input type="number" id="initBalance" placeholder="Set Balance" class="w-full border border-slate-200 p-2 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                    <button onclick="setBalance()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl hover:bg-indigo-700 transition font-bold">Set</button>
                </div>
                <p class="text-4xl font-black text-slate-800">৳ <span id="displayBalance">0.00</span></p>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex items-center justify-between">
                <div>
                    <h3 class="text-slate-400 text-xs font-bold uppercase mb-1">Live Weather</h3>
                    <p id="temp" class="text-2xl font-black">--°C</p>
                    <p id="city" class="text-slate-400 text-[10px] uppercase font-bold italic tracking-widest">Detecting...</p>
                </div>
                <i id="weather-icon" class="fas fa-cloud-sun text-4xl text-orange-400"></i>
            </div>

            <div class="bg-indigo-900 p-6 rounded-3xl shadow-sm text-white flex flex-col justify-center relative overflow-hidden">
                <div class="z-10">
                    <h3 class="text-indigo-300 text-xs font-bold uppercase mb-1">System Status</h3>
                    <p id="status-msg" class="text-sm font-medium">Monitoring Tasks...</p>
                </div>
                <i class="fas fa-bell text-6xl absolute -right-2 -bottom-2 opacity-10 rotate-12"></i>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-md border border-slate-100">
            <h2 class="text-lg font-bold mb-6 flex items-center gap-2 text-indigo-600">
                <i class="fas fa-calendar-plus"></i> Add New Task / Expense
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <select id="expCategory" class="border border-slate-200 p-3 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 bg-slate-50">
                    <option value="House Rent">House/Mess Rent</option>
                    <option value="Market">Monthly Market</option>
                    <option value="EMI">Loan EMI</option>
                    <option value="Mobile">Mobile Recharge</option>
                    <option value="Bills">Bills (Current/Water/Gas)</option>
                    <option value="Extra">Extra Cost</option>
                </select>
                <input type="number" id="expAmount" placeholder="Amount (৳)" class="border border-slate-200 p-3 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 bg-slate-50">
                <input type="datetime-local" id="expDate" class="border border-slate-200 p-3 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 bg-slate-50 text-xs">
                <button onclick="scheduleTask()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-2xl transition shadow-lg uppercase tracking-tighter">Save & Remind</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-3xl shadow-md border border-slate-100">
                <h2 class="text-lg font-bold mb-4 text-orange-600 flex items-center gap-2">
                    <i class="fas fa-history"></i> Pending Notifications
                </h2>
                <div id="pendingList" class="space-y-3 max-h-[300px] overflow-y-auto pr-2">
                    <p class="text-slate-400 text-sm italic">No upcoming tasks found.</p>
                </div>
            </div>

            <div class="space-y-4">
                <div class="bg-blue-600 p-6 rounded-3xl text-white shadow-lg flex justify-between items-center">
                    <div>
                        <h2 class="font-black text-xl italic italic">Student Portal</h2>
                        <p class="text-[10px] opacity-70">Routine & Assignments</p>
                    </div>
                    <button onclick="window.location.href='student-tool.html'" class="bg-white text-blue-600 px-4 py-2 rounded-xl font-bold text-xs">Open</button>
                </div>
                <div class="bg-emerald-600 p-6 rounded-3xl text-white shadow-lg flex justify-between items-center">
                    <div>
                        <h2 class="font-black text-xl italic italic">Pro Portal</h2>
                        <p class="text-[10px] opacity-70">Schedule & Statements</p>
                    </div>
                    <button class="bg-white text-emerald-600 px-4 py-2 rounded-xl font-bold text-xs">Open</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Core Variables & Persistence
        let balance = parseFloat(localStorage.getItem('m_bal')) || 0;
        let tasks = JSON.parse(localStorage.getItem('m_tasks')) || [];

        // 2. Notification Permission Request
        if (Notification.permission !== "granted") {
            Notification.requestPermission();
        }

        // 3. Live Update Clock & Tasks
        function tick() {
            const now = new Date();
            document.getElementById('live-date').innerText = now.toDateString();
            document.getElementById('live-time').innerText = now.toLocaleTimeString();
            checkReminders(now);
        }
        setInterval(tick, 1000); tick();

        function updateUI() {
            document.getElementById('displayBalance').innerText = balance.toLocaleString('en-IN', {minimumFractionDigits: 2});
            renderTasks();
            localStorage.setItem('m_bal', balance);
            localStorage.setItem('m_tasks', JSON.stringify(tasks));
        }

        // 4. Weather API (Dynamic Location)
        function getWeather() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    // Using a public free API for location
                    fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`)
                    .then(res => res.json())
                    .then(data => {
                        document.getElementById('city').innerText = data.city || data.locality;
                        // For temperature, you'd usually use OpenWeather, using a demo temp here:
                        document.getElementById('temp').innerText = "32°C"; 
                    });
                }, () => {
                    document.getElementById('city').innerText = "Location Blocked";
                });
            }
        }
        getWeather();

        // 5. Balance Controls
        function setBalance() {
            let val = document.getElementById('initBalance').value;
            if(val !== "" && val >= 0) {
                balance = parseFloat(val);
                updateUI();
                document.getElementById('initBalance').value = "";
            }
        }

        // 6. Task Scheduling & Notification
        function scheduleTask() {
            const amt = parseFloat(document.getElementById('expAmount').value);
            const cat = document.getElementById('expCategory').value;
            const date = document.getElementById('expDate').value;

            if(!amt || !date) {
                alert("Please input amount and date/time!");
                return;
            }

            const newTask = {
                id: Date.now(),
                amount: amt,
                category: cat,
                targetTime: new Date(date).getTime(),
                displayTime: new Date(date).toLocaleString(),
                notified: false,
                status: 'pending'
            };

            tasks.push(newTask);
            updateUI();
            
            document.getElementById('expAmount').value = "";
            document.getElementById('expDate').value = "";
        }

        function renderTasks() {
            const list = document.getElementById('pendingList');
            const pending = tasks.filter(t => t.status === 'pending');
            
            if(pending.length === 0) {
                list.innerHTML = `<p class="text-slate-400 text-sm italic">No upcoming tasks found.</p>`;
                return;
            }

            list.innerHTML = "";
            pending.forEach(t => {
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border-l-4 ${new Date().getTime() >= t.targetTime ? 'border-orange-500 animate-pulse' : 'border-indigo-400'}">
                        <div>
                            <p class="font-bold text-slate-800">${t.category}</p>
                            <p class="text-[9px] text-slate-400 font-bold uppercase">${t.displayTime}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="font-black text-rose-600">৳${t.amount}</span>
                            <button onclick="confirmExpense(${t.id})" class="bg-indigo-600 text-white w-8 h-8 rounded-full flex items-center justify-center hover:bg-green-500 shadow-md transition">
                                <i class="fas fa-check"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function checkReminders(now) {
            const cur = now.getTime();
            tasks.forEach(t => {
                if(t.status === 'pending' && !t.notified && cur >= t.targetTime) {
                    if(Notification.permission === "granted") {
                        new Notification("Manager: Task Due!", {
                            body: `Time to pay ৳${t.amount} for ${t.category}. Click check to deduct.`,
                            icon: "https://cdn-icons-png.flaticon.com/512/1827/1827347.png"
                        });
                    }
                    t.notified = true;
                    updateUI();
                }
            });
        }

        function confirmExpense(id) {
            const idx = tasks.findIndex(t => t.id === id);
            const task = tasks[idx];

            if(balance >= task.amount) {
                balance -= task.amount;
                task.status = 'completed';
                updateUI();
                alert(`Successfully reduced ৳${task.amount} from balance.`);
            } else {
                alert("Error: Low Balance!");
            }
        }

        // Initialize UI
        updateUI();

    </script>
</body>
</html>
